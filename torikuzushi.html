<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取り崩しシミュレーション</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #e11d48;
            --secondary-color: #2563eb;
            --diff-color: #8b5cf6;
            --bg-color: #f1f5f9;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 850px;
        }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .control { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #475569; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        button { grid-column: span 2; padding: 16px; background-color: #1e293b; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #334155; }
        .results-area { margin-top: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .result-card { padding: 20px 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; text-align: center; }
        .result-card.highlight { border: 2px solid var(--diff-color); background: #f5f3ff; }
        .result-label { font-size: 0.85rem; color: #64748b; margin-bottom: 10px; display: block; }
        .years { font-size: 1.6rem; color: #1e293b; font-weight: bold; }
        .months { font-size: 1rem; color: #64748b; }
        .diff-value { color: var(--diff-color); }
        canvas { margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <p style="text-align: center; margin-bottom: 0;">
        <a href="https://www.shukatsubito.jp/" target="_blank" style="text-decoration: none; color: #64748b; font-size: 0.9rem;">終活人.jp</a>
    </p>
    
    <h1 style="text-align: center; margin-top: 5px; margin-bottom: 20px;">取り崩しシミュレーション</h1>

    <div class="input-grid">
        <div class="control">
            <label>現在の資産額 (円)</label>
            <input type="text" id="totalAssets" value="30,000,000" onblur="formatCurrency(this)">
        </div>
        <div class="control">
            <label>毎月の取崩額 (円)</label>
            <input type="text" id="monthlyWithdrawal" value="150,000" onblur="formatCurrency(this)">
        </div>
        <div class="control" style="grid-column: span 2;">
            <label>運用利回り (1.0〜15.0%)</label>
            <input type="number" id="annualRate" value="3.0" min="1" max="15" step="0.1">
        </div>
        <button onclick="calculate()">シミュレーション実行</button>
    </div>

    <div class="results-area">
        <div class="result-card">
            <span class="result-label">運用なしで取崩し</span>
            <span id="resNoInvest">-</span>
        </div>
        <div class="result-card">
            <span class="result-label">運用ありで取崩し</span>
            <span id="resWithInvest">-</span>
        </div>
        <div class="result-card highlight">
            <span class="result-label">運用による延命効果</span>
            <span class="diff-value" id="resDiff">-</span>
        </div>
    </div>

    <canvas id="longevityChart"></canvas>
</div>

<script>
    let longevityChart = null;

    function formatCurrency(input) {
        let value = input.value.replace(/,/g, '');
        if (!isNaN(value) && value !== "") {
            input.value = Number(value).toLocaleString();
        }
    }

    function getNumber(id) {
        return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    }

    function formatYearMonth(totalMonths) {
        if (totalMonths >= 1200) return "100年以上";
        const y = Math.floor(totalMonths / 12);
        const m = totalMonths % 12;
        return `<span class="years">${y}</span>年<span class="months">${m}ヶ月</span>`;
    }

    function calculate() {
        const principal = getNumber('totalAssets');
        const withdrawal = getNumber('monthlyWithdrawal');
        const annualRate = parseFloat(document.getElementById('annualRate').value) / 100;
        
        const monthsNoInvest = Math.floor(principal / withdrawal);
        const r = annualRate / 12;
        let monthsWithInvest = 0;
        let currentBalance = principal;

        while (currentBalance >= withdrawal && monthsWithInvest < 1200) {
            currentBalance = currentBalance * (1 + r);
            currentBalance -= withdrawal;
            monthsWithInvest++;
        }

        document.getElementById('resNoInvest').innerHTML = formatYearMonth(monthsNoInvest);
        document.getElementById('resWithInvest').innerHTML = formatYearMonth(monthsWithInvest);
        const diff = monthsWithInvest - monthsNoInvest;
        document.getElementById('resDiff').innerHTML = diff > 0 ? formatYearMonth(diff) : "0年0ヶ月";

        updateChart(monthsNoInvest, monthsWithInvest);
    }

    function updateChart(val1, val2) {
        const ctx = document.getElementById('longevityChart').getContext('2d');
        if (longevityChart) longevityChart.destroy();
        longevityChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['運用なし', '運用あり'],
                datasets: [{
                    data: [val1, val2],
                    backgroundColor: ['#cbd5e1', '#2563eb'],
                    borderRadius: 8
                }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true } }
            }
        });
    }

    window.onload = calculate;
</script>

</body>
</html>
