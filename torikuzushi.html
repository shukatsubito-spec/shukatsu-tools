<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取り崩しシミュレーション</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        button, input, select, textarea { font-family: inherit; font-size: inherit; }
        html { font-size: 16px; }
        :root {
            --primary-color: #185FA5;
            --secondary-color: #0C447C;
            --bg-color: #F5F0E8;
        }
        body {
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .fs-bar {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.875em;
            color: #555;
            width: 100%;
            max-width: 850px;
        }
        .fs-bar span { margin-right: 8px; }
        .fs-btn {
            padding: 3px 10px; margin: 0 2px;
            border: 1px solid #185FA5; border-radius: 4px;
            background: #FDFAF5; color: #185FA5;
            cursor: pointer; font-size: 0.875em;
        }
        .fs-btn.active { background: #185FA5; color: #fff; }
        .container {
            background: #FDFAF5; padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%; max-width: 850px;
        }
        h1 { text-align: center; color: #185FA5; margin-bottom: 30px; font-size: 1.5em; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .control { display: flex; flex-direction: column; }
        .control.full { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 0.875em; color: #555; }
        input {
            padding: 12px; border: 1px solid #d4c9b0;
            border-radius: 8px; font-size: 1em; background: #FDFAF5;
        }
        .hint { font-size: 0.75em; color: #999; margin-top: 4px; }
        .btn-calc {
            grid-column: span 2; padding: 16px;
            background-color: #185FA5; color: white;
            border: none; border-radius: 8px;
            font-size: 1.125em; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-calc:hover { background-color: #0C447C; }
        .btn-reset {
            grid-column: span 2; padding: 16px;
            background-color: #C62828; color: white;
            border: none; border-radius: 8px;
            font-size: 1.125em; font-weight: bold;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-reset:hover { background-color: #B71C1C; }
        .results-area {
            margin-top: 30px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .result-card {
            padding: 20px 10px; background: #FDFAF5;
            border: 1px solid #d4c9b0; border-radius: 12px; text-align: center;
        }
        .result-card.highlight { border: 2px solid #185FA5; background: #E6F1FB; }
        .result-label { font-size: 0.875em; color: #666; margin-bottom: 10px; display: block; }
        .years { font-size: 1.5em; color: #185FA5; font-weight: bold; }
        .months { font-size: 1em; color: #666; }
        .diff-value { color: #185FA5; }
        .age-note { font-size: 0.85em; color: #185FA5; margin-top: 8px; font-weight: bold; }
        canvas { margin-top: 40px; }
        .site-link {
            text-align: center; display: block;
            text-decoration: none; color: #666;
            font-size: 0.75em; margin-bottom: 5px;
        }
        .site-link:hover { text-decoration: underline; }
        .footer-credit { font-size: 0.75em; color: #888; text-align: center; margin-top: 24px; }
        .footer-credit a { color: #185FA5; text-decoration: none; }
        .footer-credit a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="fs-bar">
    <span>文字サイズ</span>
    <button class="fs-btn active" onclick="setFS(16,this)">100%</button>
    <button class="fs-btn" onclick="setFS(19,this)">120%</button>
    <button class="fs-btn" onclick="setFS(22,this)">140%</button>
</div>

<div class="container">
    <a href="https://www.shukatsubito.jp/" target="_blank" rel="noopener" class="site-link">終活人.jp</a>
    <h1>取り崩しシミュレーション</h1>

    <div class="input-grid">
        <div class="control">
            <label>現在の資産額 (円)</label>
            <input type="text" id="totalAssets" value="" onblur="formatCurrency(this)">
        </div>
        <div class="control">
            <label>毎月の取崩額 (円)</label>
            <input type="text" id="monthlyWithdrawal" value="" onblur="formatCurrency(this)">
        </div>
        <div class="control">
            <label>想定利回り・年率 (%)</label>
            <input type="number" id="annualRate" value="" min="0" max="15" step="0.1">
        </div>
        <div class="control">
            <label>想定リスク・年率 (%)</label>
            <input type="number" id="annualRisk" value="" min="0" max="50" step="0.1">
            <span class="hint">0% = 確定的な計算。大きいほど実質リターン低下</span>
        </div>
        <div class="control full">
            <label>取り崩し開始年齢 (歳)　※省略可</label>
            <input type="number" id="startAge" value="" min="0" max="100" step="1">
            <span class="hint">入力すると取り崩し終了年齢を表示します</span>
        </div>
        <button type="button" class="btn-reset" onclick="resetForm()">リセット</button>
        <button type="button" class="btn-calc" onclick="calculate()">シミュレーション実行</button>
    </div>

    <div class="results-area">
        <div class="result-card">
            <span class="result-label">運用なしで取崩し</span>
            <span id="resNoInvest">-</span>
            <div class="age-note" id="ageNoInvest"></div>
        </div>
        <div class="result-card">
            <span class="result-label">運用ありで取崩し</span>
            <span id="resWithInvest">-</span>
            <div class="age-note" id="ageWithInvest"></div>
        </div>
        <div class="result-card highlight">
            <span class="result-label">運用による延命効果</span>
            <span class="diff-value" id="resDiff">-</span>
        </div>
    </div>

    <canvas id="longevityChart"></canvas>

    <div class="footer-credit">
        <a href="https://www.shukatsubito.jp/" target="_blank" rel="noopener">終活人.jp</a>
        <p>© 終活人.jp ／ 無断転載・商用利用禁止</p>
    </div>
</div>

<script>
    function setFS(px, btn) {
        document.documentElement.style.fontSize = px + 'px';
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    let longevityChart = null;

    function formatCurrency(input) {
        let value = input.value.replace(/,/g, '');
        if (!isNaN(value) && value !== "") {
            input.value = Number(value).toLocaleString();
        }
    }

    function getNumber(id) {
        return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    }

    function formatYearMonth(totalMonths) {
        if (totalMonths >= 1200) return "100年以上";
        const y = Math.floor(totalMonths / 12);
        const m = totalMonths % 12;
        return '<span class="years">' + y + '</span>年<span class="months">' + m + 'ヶ月</span>';
    }

    function calcEndAge(startAge, totalMonths) {
        if (totalMonths >= 1200) return '（100歳以降も継続）';
        const totalYears = totalMonths / 12;
        const endAgeTotal = startAge + totalYears;
        const endAgeYear  = Math.floor(endAgeTotal);
        const endAgeMonth = Math.round((endAgeTotal - endAgeYear) * 12);
        if (endAgeMonth > 0) {
            return '（' + endAgeYear + '歳' + endAgeMonth + 'ヶ月で枯渇）';
        } else {
            return '（' + endAgeYear + '歳で枯渇）';
        }
    }

    function calculate() {
        var aVal  = document.getElementById('totalAssets').value.replace(/,/g,'');
        var wVal  = document.getElementById('monthlyWithdrawal').value.replace(/,/g,'');
        var rVal  = document.getElementById('annualRate').value;
        var skVal = document.getElementById('annualRisk').value;

        if (aVal === '' || wVal === '' || rVal === '' || skVal === '') {
            document.getElementById('resNoInvest').innerHTML   = '-';
            document.getElementById('resWithInvest').innerHTML = '-';
            document.getElementById('resDiff').innerHTML       = '-';
            document.getElementById('ageNoInvest').textContent  = '';
            document.getElementById('ageWithInvest').textContent = '';
            alert('資産額・取崩額・利回り・リスクをすべて入力してください。');
            return;
        }

        var principal  = getNumber('totalAssets');
        var withdrawal = getNumber('monthlyWithdrawal');
        var annualRate = parseFloat(rVal) / 100;
        var annualRisk = parseFloat(skVal) / 100;
        var startAge   = parseFloat(document.getElementById('startAge').value) || 0;

        // リスク調整後の実効年利: 年利 - 0.5 × リスク²
        var effectiveRate = annualRate - 0.5 * annualRisk * annualRisk;

        // 運用なし
        var monthsNoInvest = Math.floor(principal / withdrawal);

        // 運用あり（正確な月利換算）
        var r = Math.pow(1 + effectiveRate, 1/12) - 1;
        var monthsWithInvest = 0;
        var currentBalance = principal;
        while (currentBalance >= withdrawal && monthsWithInvest < 1200) {
            currentBalance = currentBalance * (1 + r) - withdrawal;
            monthsWithInvest++;
        }

        document.getElementById('resNoInvest').innerHTML   = formatYearMonth(monthsNoInvest);
        document.getElementById('resWithInvest').innerHTML = formatYearMonth(monthsWithInvest);
        var diff = monthsWithInvest - monthsNoInvest;
        document.getElementById('resDiff').innerHTML = diff > 0 ? formatYearMonth(diff) : '0年0ヶ月';

        // 取り崩し終了年齢（開始年齢が入力されている場合のみ）
        if (startAge > 0) {
            document.getElementById('ageNoInvest').textContent  = calcEndAge(startAge, monthsNoInvest);
            document.getElementById('ageWithInvest').textContent = calcEndAge(startAge, monthsWithInvest);
        } else {
            document.getElementById('ageNoInvest').textContent  = '';
            document.getElementById('ageWithInvest').textContent = '';
        }

        updateChart(monthsNoInvest, monthsWithInvest, startAge);
    }

    function updateChart(val1, val2, startAge) {
        var ctx = document.getElementById('longevityChart').getContext('2d');
        if (longevityChart) longevityChart.destroy();

        var label1, label2;
        if (startAge > 0) {
            var end1 = (startAge + val1 / 12).toFixed(1);
            var end2 = (startAge + val2 / 12).toFixed(1);
            label1 = '運用なし（' + end1 + '歳まで）';
            label2 = '運用あり（' + end2 + '歳まで）';
        } else {
            label1 = '運用なし';
            label2 = '運用あり';
        }

        longevityChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [label1, label2],
                datasets: [{
                    data: [val1, val2],
                    backgroundColor: ['#d4c9b0', '#185FA5'],
                    borderRadius: 8
                }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(v) {
                                var y = Math.floor(v / 12);
                                var m = v % 12;
                                return m === 0 ? y + '年' : y + '年' + m + 'ヶ月';
                            }
                        }
                    }
                }
            }
        });
    }

    function resetForm() {
        document.getElementById('totalAssets').value     = '';
        document.getElementById('monthlyWithdrawal').value = '';
        document.getElementById('annualRate').value      = '';
        document.getElementById('annualRisk').value      = '';
        document.getElementById('startAge').value        = '';
        document.getElementById('resNoInvest').innerHTML   = '-';
        document.getElementById('resWithInvest').innerHTML = '-';
        document.getElementById('resDiff').innerHTML       = '-';
        document.getElementById('ageNoInvest').textContent  = '';
        document.getElementById('ageWithInvest').textContent = '';
        if (longevityChart) { longevityChart.destroy(); longevityChart = null; }
    }

    window.onload = resetForm;
</script>

</body>
</html>
