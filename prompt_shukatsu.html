<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプト！終活｜終活人.jp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  button,input,select,textarea{font-family:inherit;font-size:inherit;}
  html{font-size:16px;}
  body{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;background:#F5F0E8;color:#1a1a18;}
  .wrap{max-width:860px;margin:0 auto;padding:1.5em 1em 3em;}

  h1{font-size:1.5em;font-weight:700;color:#0C447C;text-align:center;margin-bottom:0.25em;}
  .lead{font-size:0.875em;color:#555;text-align:center;margin-bottom:1.5em;line-height:1.7;}

  /* 文字サイズバー */
  .fs-bar{display:flex;align-items:center;justify-content:center;gap:0.5em;padding:0.5em 1em;background:#FDFAF5;border:0.5px solid #ddd;border-radius:8px;margin-bottom:1.5em;}
  .fs-bar span{font-size:0.875em;color:#888;}
  .fs-btn{padding:0.25em 1em;border-radius:6px;border:0.5px solid #B5D4F4;background:#F5F0E8;color:#185FA5;font-size:0.875em;cursor:pointer;transition:background 0.15s;}
  .fs-btn:hover{background:#E6F1FB;}
  .fs-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;}

  /* AIリンクバー */
  .ai-bar{display:flex;gap:0.5em;flex-wrap:wrap;justify-content:center;margin-bottom:1.5em;}
  .ai-link{display:inline-flex;align-items:center;gap:0.4em;padding:0.4em 1em;border-radius:20px;border:0.5px solid #ddd;background:#FDFAF5;text-decoration:none;color:#1a1a18;font-size:0.875em;transition:background 0.15s;}
  .ai-link:hover{background:#E6F1FB;border-color:#185FA5;}
  .ai-dot{width:0.7em;height:0.7em;border-radius:50%;flex-shrink:0;}
  .ai-bar-note{font-size:0.75em;color:#aaa;text-align:center;margin-bottom:1.5em;line-height:1.6;}

  /* カテゴリータブ */
  .cat-tabs{display:flex;flex-wrap:wrap;gap:0.4em;margin-bottom:1.2em;}
  .cat-tab{padding:0.4em 0.875em;border-radius:20px;border:0.5px solid transparent;background:#FDFAF5;color:#fff;font-size:0.875em;cursor:pointer;transition:all 0.15s;font-weight:500;}
  .cat-tab:hover{opacity:0.85;}
  .cat-tab.active{color:#fff;border-color:transparent;font-weight:700;box-shadow:0 0 0 3px #FFD700 inset;}

  /* カテゴリーセクション */
  .cat-section{display:none;margin-bottom:1em;}
  .cat-section.show{display:block;}
  .cat-title{font-size:1.125em;font-weight:700;color:#0C447C;margin-bottom:0.75em;padding-bottom:0.4em;border-bottom:2px solid #185FA5;}

  /* プロンプトカード */
  .prompt-grid{display:flex;flex-direction:column;gap:0.6em;}
  .prompt-card{background:#FDFAF5;border:0.5px solid #ddd;border-radius:10px;overflow:hidden;}
  .prompt-header{display:flex;align-items:center;justify-content:space-between;padding:0.75em 1em;cursor:pointer;user-select:none;}
  .prompt-header:hover{background:#EDE8DF;}
  .prompt-label{font-size:0.9375em;font-weight:500;color:#1a1a18;flex:1;}
  .prompt-badge{font-size:0.7em;padding:2px 6px;border-radius:3px;margin-left:0.4em;white-space:nowrap;vertical-align:middle;}
  .badge-solo{background:#FAECE7;color:#712B13;}
  .badge-imp{background:#FAEEDA;color:#633806;}
  .badge-new{background:#EAF3DE;color:#27500A;}
  .prompt-toggle{font-size:0.8em;color:#aaa;flex-shrink:0;margin-left:0.5em;}

  .prompt-body{display:none;padding:0 1em 1em;}
  .prompt-body.open{display:block;}
  .prompt-text-box{background:#f0f4fa;border:0.5px solid #B5D4F4;border-radius:8px;padding:0.875em 1em;font-size:0.875em;color:#1a1a18;line-height:1.8;white-space:pre-wrap;margin-bottom:0.5em;}
  .prompt-note{font-size:0.75em;color:#888;line-height:1.6;margin-bottom:0.5em;}
  .copy-row{display:flex;justify-content:flex-end;}
  .copy-btn{font-size:0.875em;padding:0.375em 1em;border-radius:6px;border:0.5px solid #185FA5;background:#FDFAF5;color:#185FA5;cursor:pointer;transition:background 0.15s;}
  .copy-btn:hover{background:#E6F1FB;}
  .copy-btn.copied{background:#E1F5EE;color:#085041;border-color:#0F6E56;}

  /* フッター */
  .footer{margin-top:2em;padding-top:1em;border-top:0.5px solid #ddd;text-align:center;}
  .footer a{color:#185FA5;text-decoration:none;font-size:1em;font-weight:500;border-bottom:1.5px solid #B5D4F4;}
  .footer a:hover{color:#0C447C;}
  .footer-credit{font-size:0.75em;color:#aaa;margin-top:6px;line-height:1.8;}

  @media(max-width:540px){
    .cat-tabs{gap:0.3em;}
    .cat-tab{font-size:0.8em;padding:0.35em 0.7em;}
  }
</style>
</head>

<div class="wrap">

  <div class="cat-section show" id="cat-money">

    <div class="prompt-grid" id="grid-money"></div>
  </div>

  <!-- ===== 自宅と実家 ===== -->
  <div class="cat-section" id="cat-home">
    <div class="cat-title">自宅と実家</div>
    <div class="prompt-grid" id="grid-home"></div>
  </div>

  <!-- ===== 相続と遺言 ===== -->
  <div class="cat-section" id="cat-estate">

  <!-- ===== 葬儀とお墓 ===== -->

    <div class="prompt-grid" id="grid-funeral"></div>
  </div>

  <!-- ===== 健康と介護 ===== -->

    <div class="cat-title">健康と介護</div>
    <div class="prompt-grid" id="grid-health"></div>
  </div>

  <!-- ===== デジタル整理とペット ===== -->
  <div class="cat-section" id="cat-digital">
    <div class="cat-title">デジタル整理とペット</div>
    <div class="prompt-grid" id="grid-digital"></div>
  </div>

  <!-- ===== おひとりさま終活 ===== -->
  <div class="cat-section" id="cat-solo">
    <div class="cat-title">おひとりさま終活</div>
    <div class="prompt-grid" id="grid-solo"></div>
  </div>

  <div class="footer">
    <a href="https://www.shukatsubito.jp/" target="_blank" rel="noopener">終活人.jp</a>
    <p class="footer-credit">© 終活人.jp ／ 無断転載・商用利用禁止 ／ 本ページのプロンプト例の著作権は終活人.jpに帰属します</p>

</div>
<script>
// ===== 文字サイズ =====
function setFS(px,btn){
  document.documentElement.style.fontSize=px+'px';
  document.querySelectorAll('.fs-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== カテゴリー切替 =====
function showCat(id,btn){
  document.querySelectorAll('.cat-section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.cat-tab').forEach(b=>{
    b.classList.remove('active');
    b.style.color='#fff';
  });
  document.getElementById('cat-'+id).classList.add('show');
  btn.classList.add('active');
  btn.style.color='#fff';
}

// ===== カードを生成 =====
function buildCards(){
  Object.keys(data).forEach(cat=>{
    const grid=document.getElementById('grid-'+cat);
    data[cat].forEach((item,idx)=>{
      const id=`${cat}_${idx}`;
      const badges=item.badges.map(b=>`<span class="prompt-badge ${b.cls}">${b.text}</span>`).join('');
      const note=item.note?`<p class="prompt-note">※ ${item.note}</p>`:'';
      const card=document.createElement('div');
      card.className='prompt-card';
      card.innerHTML=`
        <div class="prompt-header" onclick="toggleCard('${id}')">
          <span class="prompt-label">${item.label}${badges}</span>
          <span class="prompt-toggle" id="tog-${id}">▼</span>
        </div>
        <div class="prompt-body" id="body-${id}">
          <div class="prompt-text-box">${escHtml(item.text)}</div>
          ${note}
          <div class="copy-row">
            <button class="copy-btn" id="copybtn-${id}" onclick="copyCard('${id}')">このプロンプトをコピー</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  });
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const tog=document.getElementById('tog-'+id);
  const open=body.classList.toggle('open');
  tog.textContent=open?'▲':'▼';
}

function copyCard(id){
  const cat=id.split('_')[0];
  const idx=parseInt(id.split('_')[1]);
  const text=data[cat][idx].text;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copybtn-'+id);
    btn.textContent='コピーしました！';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='このプロンプトをコピー';btn.classList.remove('copied');},2500);
  });
}

buildCards();
