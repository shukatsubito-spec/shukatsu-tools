<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>積立投資シミュレーション</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        button, input, select, textarea {
            font-family: inherit;
            font-size: inherit;
        }

        html {
            font-size: 16px;
        }

        :root {
            --primary-color: #185FA5;
            --secondary-color: #0C447C;
            --bg-color: #F5F0E8;
        }

        body {
            font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 文字サイズ変更バー */
        .fs-bar {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.875em;
            color: #555;
            width: 100%;
            max-width: 800px;
        }
        .fs-bar span {
            margin-right: 8px;
        }
        .fs-btn {
            padding: 3px 10px;
            margin: 0 2px;
            border: 1px solid #185FA5;
            border-radius: 4px;
            background: #FDFAF5;
            color: #185FA5;
            cursor: pointer;
            font-size: 0.875em;
        }
        .fs-btn.active {
            background: #185FA5;
            color: #fff;
        }

        .container {
            background: #FDFAF5;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #185FA5;
            margin-bottom: 30px;
            font-size: 1.5em;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .control {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.875em;
            color: #555;
        }

        input {
            padding: 10px;
            border: 1px solid #d4c9b0;
            border-radius: 6px;
            font-size: 1em;
            background: #FDFAF5;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.125em;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        .results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }

        .result-card {
            padding: 15px;
            background: #EDE8DF;
            border-radius: 8px;
            border: 1px solid #d4c9b0;
            font-size: 1em;
        }

        .result-card span {
            display: block;
            font-size: 1.25em;
            font-weight: bold;
            color: var(--primary-color);
        }

        .result-card.highlight {
            border: 2px solid #185FA5;
            background: #E6F1FB;
        }

        canvas {
            margin-top: 30px;
        }

        .site-link {
            text-align: center;
            display: block;
            text-decoration: none;
            color: #666;
            font-size: 0.75em;
            margin-bottom: 5px;
        }
        .site-link:hover {
            text-decoration: underline;
        }

        .footer-credit {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            margin-top: 24px;
        }
        .footer-credit a {
            color: #185FA5;
            text-decoration: none;
        }
        .footer-credit a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="fs-bar">
    <span>文字サイズ</span>
    <button class="fs-btn active" onclick="setFS(16,this)">100%</button>
    <button class="fs-btn" onclick="setFS(19,this)">120%</button>
    <button class="fs-btn" onclick="setFS(22,this)">140%</button>
</div>

<div class="container">
    <a href="https://www.shukatsubito.jp/" target="_blank" rel="noopener" class="site-link">終活人.jp</a>
    <h1>積立投資シミュレーション</h1>

    <div class="input-group">
        <div class="control">
            <label>毎月の積立額 (1,000〜100,000円)</label>
            <input type="text" id="monthlyAmount" value="10,000" onblur="formatCurrency(this)">
        </div>
        <div class="control">
            <label>想定利回り (1.0〜15.0%)</label>
            <input type="number" id="annualRate" value="3.0" min="1" max="15" step="0.1">
        </div>
        <div class="control">
            <label>積立期間 (1〜40年)</label>
            <input type="number" id="years" value="20" min="1" max="40" step="1">
        </div>
        <button onclick="calculate()">計算する</button>
    </div>

    <div class="results">
        <div class="result-card">
            投資累計額
            <span id="totalPrincipal">- 円</span>
        </div>
        <div class="result-card highlight">
            最終積立総額
            <span id="totalAmount">- 円</span>
        </div>
    </div>

    <canvas id="myChart"></canvas>

    <div class="footer-credit">
        <a href="https://www.shukatsubito.jp/" target="_blank" rel="noopener">終活人.jp</a>
        <p>© 終活人.jp ／ 無断転載・商用利用禁止</p>
    </div>
</div>

<script>
    function setFS(px, btn) {
        document.documentElement.style.fontSize = px + 'px';
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    let myChart = null;

    function formatCurrency(input) {
        let value = input.value.replace(/,/g, '');
        if (!isNaN(value) && value !== "") {
            input.value = Number(value).toLocaleString();
        }
    }

    function getNumber(id) {
        return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    }

    function calculate() {
        const A = getNumber('monthlyAmount');
        const annualRate = parseFloat(document.getElementById('annualRate').value) / 100;
        const years = parseInt(document.getElementById('years').value);
        
        const r = annualRate / 12;

        let labels = [];
        let principalData = [];
        let totalData = [];

        for (let i = 1; i <= years; i++) {
            const m = i * 12;
            const principal = A * m;
            const total = A * ((Math.pow(1 + r, m) - 1) / r);
            
            labels.push(i + "年目");
            principalData.push(Math.round(principal));
            totalData.push(Math.round(total));
        }

        document.getElementById('totalPrincipal').innerText = principalData[principalData.length - 1].toLocaleString() + " 円";
        document.getElementById('totalAmount').innerText = totalData[totalData.length - 1].toLocaleString() + " 円";

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '投資累計額（元本）', data: principalData, backgroundColor: '#d4c9b0' },
                    { label: '投資累計額 + 利回り（総額）', data: totalData, backgroundColor: '#185FA5' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { stacked: true },
                    y: { 
                        beginAtZero: true,
                        ticks: { callback: function(value) { return value.toLocaleString() + '円' } }
                    }
                }
            }
        });
    }

    window.onload = calculate;
</script>

</body>
</html>
