<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>積立投資シミュレーション</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --bg-color: #f8fafc;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 30px;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .control {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        .result-card {
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
        }
        .result-card span {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        canvas {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <p style="text-align: center; margin-bottom: 0;">
        <a href="https://www.shukatsubito.jp/" target="_blank" style="text-decoration: none; color: #64748b; font-size: 0.9rem;">終活人.jp</a>
    </p>
    
    <h1 style="text-align: center; margin-top: 5px; margin-bottom: 20px;">積立投資シミュレーション</h1>

    <div class="input-group">
        <div class="control">
            <label>毎月の積立額 (1,000〜100,000円)</label>
            <input type="text" id="monthlyAmount" value="10,000" onblur="formatCurrency(this)">
        </div>
        <div class="control">
            <label>想定利回り (1.0〜15.0%)</label>
            <input type="number" id="annualRate" value="3.0" min="1" max="15" step="0.1">
        </div>
        <div class="control">
            <label>積立期間 (1〜40年)</label>
            <input type="number" id="years" value="20" min="1" max="40" step="1">
        </div>
        <button onclick="calculate()">計算する</button>
    </div>

    <div class="results">
        <div class="result-card">
            投資累計額
            <span id="totalPrincipal">- 円</span>
        </div>
        <div class="result-card" style="border: 2px solid var(--secondary-color);">
            最終積立総額
            <span id="totalAmount">- 円</span>
        </div>
    </div>

    <canvas id="myChart"></canvas>
</div>

<script>
    let myChart = null;

    // カンマ区切りにする関数
    function formatCurrency(input) {
        let value = input.value.replace(/,/g, '');
        if (!isNaN(value) && value !== "") {
            input.value = Number(value).toLocaleString();
        }
    }

    // カンマを消して数値に戻す関数
    function getNumber(id) {
        return parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    }

    function calculate() {
        const A = getNumber('monthlyAmount');
        const annualRate = parseFloat(document.getElementById('annualRate').value) / 100;
        const years = parseInt(document.getElementById('years').value);
        
        const r = annualRate / 12;
        const months = years * 12;

        let labels = [];
        let principalData = [];
        let totalData = [];

        for (let i = 1; i <= years; i++) {
            const m = i * 12;
            const principal = A * m;
            const total = A * ((Math.pow(1 + r, m) - 1) / r);
            
            labels.push(i + "年目");
            principalData.push(Math.round(principal));
            totalData.push(Math.round(total));
        }

        document.getElementById('totalPrincipal').innerText = principalData[principalData.length - 1].toLocaleString() + " 円";
        document.getElementById('totalAmount').innerText = totalData[totalData.length - 1].toLocaleString() + " 円";

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '投資累計額（元本）', data: principalData, backgroundColor: '#cbd5e1' },
                    { label: '投資累計額 + 利回り（総額）', data: totalData, backgroundColor: '#10b981' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { stacked: true },
                    y: { 
                        beginAtZero: true,
                        ticks: { callback: function(value) { return value.toLocaleString() + '円' } }
                    }
                }
            }
        });
    }

    window.onload = calculate;
</script>

</body>
</html>
